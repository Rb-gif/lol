name: Windows Remote Desktop with Tailscale
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Setup RDP User and Security
        shell: powershell
        run: |
          # Disable Sleep and Hibernation to prevent disconnects
          powercfg /hibernate off
          powercfg /x -monitor-timeout-ac 0
          powercfg /x -standby-timeout-ac 0

          $User = "${{ RDP }}"
          $Pass = "${{ CloudRunner2026! }}"
          $Password = ConvertTo-SecureString $Pass -AsPlainText -Force
          
          # Force create user and ignore error if already exists
          if (!(Get-LocalUser -Name $User -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $User -Password $Password -Description "RDP User" -FullName "$User" -Confirm:$false
              Add-LocalGroupMember -Group "Administrators" -Member $User
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $User
              Write-Host "Successfully created user: $User"
          } else {
              Write-Host "User $User already exists. Updating password..."
              $existingUser = Get-LocalUser -Name $User
              $existingUser | Set-LocalUser -Password $Password
          }

      - name: Install Tailscale
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          choco install tailscale -y
          
      - name: Connect to Tailscale
        shell: powershell
        run: |
          tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes
          tailscale status

      - name: Install Software (Background Process)
        shell: powershell
        continue-on-error: true
        run: |
          # Heavy apps are installed here
          $apps = @("androidstudio", "malwarebytes", "steam", "scratch3", "turbowarp-desktop", "virtualbox")
          foreach ($app in $apps) {
              Write-Host "Installing $app..."
              choco install $app -y --limit-output --no-progress --ignore-checksums
          }

      - name: Create Desktop Readme
        shell: powershell
        run: |
          $content = @"
          Show Your Cloud Is Working 
          Made By RBXuncopylocker And Gemini Google And GitHub And Tailscale
          "@
          # Ensure directory exists for the custom user
          $desktopPath = "C:\Users\${{ secrets.RDP_USERNAME }}\Desktop"
          if (!(Test-Path $desktopPath)) { 
              New-Item -ItemType Directory -Path $desktopPath -Force 
          }
          $content | Out-File -FilePath "$desktopPath\readme.txt" -Encoding ascii

      - name: Final Connection Info
        shell: powershell
        run: |
          $ip = (tailscale ip -4)
          Write-Host "----------------------------------------------------"
          Write-Host "IP: $ip"
          Write-Host "USER: ${{ secrets.RDP_USERNAME }}"
          Write-Host "PASS: (Check your GitHub Secrets)"
          Write-Host "----------------------------------------------------"
          Start-Sleep -Seconds 21600
