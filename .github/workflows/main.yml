name: macOS Remote via Tailscale
on: workflow_dispatch # Allows you to start it manually

jobs:
  terminal-access:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Start Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          # Install Tailscale using Homebrew
          brew install tailscale
          
          # Start Tailscale background service
          sudo tailscaled > /dev/null 2>&1 &
          
          # Connect to your Tailscale network
          sudo tailscale up --authkey=$TAILSCALE_AUTHKEY
          
          echo "Connected! Check your Tailscale dashboard for the machine name."

      - name: Keep Runner Alive
        run: |
          echo "Runner is active. You can SSH into this Mac now."
          # This loop keeps the Mac running for 6 hours (the GitHub limit)
          sleep 21600
