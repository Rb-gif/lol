name: macOS Remote Desktop
on: workflow_dispatch

jobs:
  desktop-access:
    runs-on: macos-latest
    steps:
      - name: Set Password for Runner
        run: |
          # Sets 'password123' as the user password (change this if you want)
          sudo dscl . -passwd /Users/runner password123

      - name: Enable Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -privs -all -restart -agent

      - name: Install and Start Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          brew install tailscale
          sudo tailscaled > /dev/null 2>&1 &
          sleep 5
          sudo tailscale up --authkey=$TAILSCALE_AUTHKEY --hostname=github-mac

      - name: Keep Alive
        run: |
          echo "Connect via VNC to the IP shown in your Tailscale dashboard."
          echo "Username: runner"
          echo "Password: password123"
          # Keeps the session open for 6 hours
          sleep 21600
