name: Windows Remote Desktop with Tailscale
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Install Tailscale
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install tailscale -y
          
      - name: Connect to Tailscale
        shell: powershell
        # You must add a TAILSCALE_AUTH_KEY to your GitHub Repository Secrets
        run: tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Install Software
        shell: powershell
        run: |
          # Installing apps via Chocolatey
          choco install androidstudio -y
          choco install malwarebytes -y
          choco install steam -y
          choco install scratch3 -y
          # Note: VirtualBox often requires a reboot/nested virtualization which may not work here.
          choco install virtualbox -y 
          # TurboWarp is often used as a desktop app or web; here is the desktop version:
          choco install turbowarp-desktop -y

      - name: Create Desktop Readme
        shell: powershell
        run: |
          $content = @"
          Show Your Cloud Is Working 
          Made By RBXuncopylocker And Gemini Google And GitHub And Tailscale
          "@
          $desktopPath = [Environment]::GetFolderPath("Desktop")
          $content | Out-File -FilePath "$desktopPath\readme.txt" -Encoding ascii

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "Windows is ready! Connect via Remote Desktop using your Tailscale IP."
          # This loops for 6 hours (the GitHub limit) to keep the VM active
          Start-Sleep -Seconds 21600
